<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeOS</title>
    <link rel="stylesheet" href="./sass/main.css">
</head>

<body>


    <div class="bodyWrapper">

        <div class="iconContainer">

            <div class="iconBox">
                <img src="./assets/edgeicon.png" alt="">
                <p>Edge</p>
            </div>
            <div class="iconBox">
                <img src="./assets/recyclebinicon.png" alt="">
                <p>Bin</p>
            </div>
            <div class="iconBox" id="currencyIcon">
                <img src="./assets/curency.png" alt="">
                <p>Currency Convertor</p>
            </div>
            <div class="iconBox" id="galleryIcon">
                <img src="./assets/gallery.png" alt="">
                <p>Gallery</p>
            </div>
            <div class="iconBox" id="notepadIcon">
                <img src="./assets/notepad.png" alt="">
                <p>Notepad</p>
            </div>


        </div>

        <!-- Notepad Modal Container -->
        <div class="modalContainer" id="notepadModal">
            <div class="navBar">
                <p class="heading">
                    Notepad
                </p>
                <button id="close">X</button>
            </div>
            <div class="toolBar">
                <button id="increaseFont">A+</button>
                <button id="decreaseFont">A-</button>
                <button id="bold">Bold</button>
                <button id="underline">Underline</button>
                <button id="clearAll">Clear All</button>
            </div>
            <div class="textEditor">
                <textarea name="text" id="text"></textarea>
            </div>
        </div>

        <!-- Gallery Modal Container -->
        <div class="modalContainer" id="galleryModal">
            <div class="navBar">
                <p class="heading">
                    Gallery
                </p>
                <button id="galleryClose">X</button>
            </div>

            <main class="carousel-container">
                <div class="carousel">
                    <div class="item active">
                        <img src="assets/nature1.jpg" alt="Image 1" />
                    </div>
                    <div class="item">
                        <img src="assets/nature2.jpg" alt="Image 2" />
                    </div>
                    <div class="item">
                        <img src="assets/nature3.jpg" alt="Image 3" />
                    </div>
                </div>
                <button class="btn prev">&lt;</button>
                <button class="btn next">&gt;</button>
                <div class="dots"></div>
            </main>
        </div>

        <!-- Currency convertor Modal Container -->
        <div class="modalContainer" id="currencyModal">
            <div class="navBar">
                <p class="heading">Currency Converter</p>
                <button id="currencyClose">X</button>
            </div>
            <div class="currencyContainer">
                <div class="main">
                    <div class="formGroup">
                        <label for="oamount">Amount to Convert:</label>
                        <input type="text" class="formControl searchBox" placeholder="0.00" id="oamount">
                    </div>
                    <div class="row">
                        <div class="col-sm-6">
                            <div class="inputGroup">
                                <div class="inputGroupPrepend">
                                    <span class="inputGroupText">From</span>
                                </div>
                                <select class="formControl from" id="sel1">
                                    <option value="">Select One …</option>
                                    <option value="USD">USD</option>
                                    <option value="AED">AED</option>
                                    <option value="ARS">ARS</option>
                                    <option value="AUD">AUD</option>
                                    <option value="BGN">BGN</option>
                                    <option value="BRL">BRL</option>
                                    <option value="BSD">BSD</option>
                                    <option value="CAD">CAD</option>
                                    <option value="CHF">CHF</option>
                                    <option value="CLP">CLP</option>
                                    <option value="CNY">CNY</option>
                                    <option value="COP">COP</option>
                                    <option value="CZK">CZK</option>
                                    <option value="DKK">DKK</option>
                                    <option value="DOP">DOP</option>
                                    <option value="EGP">EGP</option>
                                    <option value="EUR">EUR</option>
                                    <option value="FJD">FJD</option>
                                    <option value="GBP">GBP</option>
                                    <option value="GTQ">GTQ</option>
                                    <option value="HKD">HKD</option>
                                    <option value="HRK">HRK</option>
                                    <option value="HUF">HUF</option>
                                    <option value="IDR">IDR</option>
                                    <option value="ILS">ILS</option>
                                    <option value="INR">INR</option>
                                    <option value="ISK">ISK</option>
                                    <option value="JPY">JPY</option>
                                    <option value="KRW">KRW</option>
                                    <option value="KZT">KZT</option>
                                    <option value="MVR">MVR</option>
                                    <option value="MXN">MXN</option>
                                    <option value="MYR">MYR</option>
                                    <option value="NOK">NOK</option>
                                    <option value="NZD">NZD</option>
                                    <option value="PAB">PAB</option>
                                    <option value="PEN">PEN</option>
                                    <option value="PHP">PHP</option>
                                    <option value="PKR">PKR</option>
                                    <option value="PLN">PLN</option>
                                    <option value="PYG">PYG</option>
                                    <option value="RON">RON</option>
                                    <option value="RUB">RUB</option>
                                    <option value="SAR">SAR</option>
                                    <option value="SEK">SEK</option>
                                    <option value="SGD">SGD</option>
                                    <option value="THB">THB</option>
                                    <option value="TRY">TRY</option>
                                    <option value="TWD">TWD</option>
                                    <option value="UAH">UAH</option>
                                    <option value="UYU">UYU</option>
                                    <option value="ZAR">ZAR</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="inputGroup">
                                <div class="inputGroupPrepend">
                                    <span class="inputGroupText">To</span>
                                </div>
                                <select class="formControl to" id="sel2">
                                    <option value="">Select One …</option>
                                    <option value="USD">USD</option>
                                    <option value="AED">AED</option>
                                    <option value="ARS">ARS</option>
                                    <option value="AUD">AUD</option>
                                    <option value="BGN">BGN</option>
                                    <option value="BRL">BRL</option>
                                    <option value="BSD">BSD</option>
                                    <option value="CAD">CAD</option>
                                    <option value="CHF">CHF</option>
                                    <option value="CLP">CLP</option>
                                    <option value="CNY">CNY</option>
                                    <option value="COP">COP</option>
                                    <option value="CZK">CZK</option>
                                    <option value="DKK">DKK</option>
                                    <option value="DOP">DOP</option>
                                    <option value="EGP">EGP</option>
                                    <option value="EUR">EUR</option>
                                    <option value="FJD">FJD</option>
                                    <option value="GBP">GBP</option>
                                    <option value="GTQ">GTQ</option>
                                    <option value="HKD">HKD</option>
                                    <option value="HRK">HRK</option>
                                    <option value="HUF">HUF</option>
                                    <option value="IDR">IDR</option>
                                    <option value="ILS">ILS</option>
                                    <option value="INR">INR</option>
                                    <option value="ISK">ISK</option>
                                    <option value="JPY">JPY</option>
                                    <option value="KRW">KRW</option>
                                    <option value="KZT">KZT</option>
                                    <option value="MVR">MVR</option>
                                    <option value="MXN">MXN</option>
                                    <option value="MYR">MYR</option>
                                    <option value="NOK">NOK</option>
                                    <option value="NZD">NZD</option>
                                    <option value="PAB">PAB</option>
                                    <option value="PEN">PEN</option>
                                    <option value="PHP">PHP</option>
                                    <option value="PKR">PKR</option>
                                    <option value="PLN">PLN</option>
                                    <option value="PYG">PYG</option>
                                    <option value="RON">RON</option>
                                    <option value="RUB">RUB</option>
                                    <option value="SAR">SAR</option>
                                    <option value="SEK">SEK</option>
                                    <option value="SGD">SGD</option>
                                    <option value="THB">THB</option>
                                    <option value="TRY">TRY</option>
                                    <option value="TWD">TWD</option>
                                    <option value="UAH">UAH</option>
                                    <option value="UYU">UYU</option>
                                    <option value="ZAR">ZAR</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="textCenter">
                        <button class="btn convert" type="submit">Convert</button>
                        <button class="btn" onclick="clearVal()">Reset</button>
                    </div>
                    <div id="finalAmount" class="text-center">
                        <h2>Converted Amount: <span class="finalValue" style="color:green;"></span></h2>
                    </div>
                </div>
            </div>
        </div>


        <div class="taskBar">
            <div class="menuContainer">
                <img id="windowIcon" src="./assets/windows.png" alt="">
            </div>
            <div class="dateTimeContainer">
                <p id="time"></p>
                <p id="date"></p>
            </div>
        </div>

        <div class="startMenu">
            <div class="itemContainer">
                <div class="itemBox">
                    <img src="./assets/calculator.png" alt="">
                    <p>Calcuator</p>
                </div>
                <div class="itemBox">
                    <img src="./assets/edgeicon.png" alt="">
                    <p>Microsoft Edge</p>
                </div>
                <div class="itemBox">
                    <img src="./assets/gallery.png" alt="">
                    <p>Gallery</p>
                </div>
                <div class="itemBox">
                    <img src="./assets/paint.png" alt="">
                    <p>Paint</p>
                </div>
                <div class="itemBox">
                    <img src="./assets/notepad.png" alt="">
                    <p>Notepad</p>
                </div>
            </div>
        </div>
    </div>

    <script src="./scripts/scripts.js"></script>
    <script src="./scripts/dateTimeScripts.js"></script>
    <script src="./scripts/startMenuScript.js"></script>
    <script src="./scripts/modalScript.js"></script>
    <script src="./scripts/notepadScripts.js"></script>
    <script src="./scripts/caraouseScript.js"></script>
    <script src="./scripts/currencyConvertor.js"></script>
</body>

</html>
